<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT PKN</title>

<style>
*{box-sizing:border-box;}
html,body{
margin:0;
font-family:Arial;
background:#f4f4f4;
overflow-x:hidden; /* 🔥 hanya scroll atas bawah */
}

.header{
position:fixed;
top:0;
width:100%;
background:#007bff;
color:#fff;
text-align:center;
padding:10px;
z-index:999;
}

.logo{
width:70px;
display:block;
margin:auto;
}

.timer{
font-size:18px;
font-weight:bold;
margin-top:5px;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
margin-top:200px;
}

li{
margin-bottom:55px; /* 🔥 jarak soal lega */
line-height:1.6;
}

.opsi{
display:block;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
background:#fff;
cursor:pointer;
}

.opsi.selected{
background:#28a745;
color:#fff;
border-color:#28a745;
}

textarea,input{
width:100%;
padding:12px;
margin-top:8px;
font-size:15px;
}

textarea{
min-height:150px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
background:#007bff;
color:#fff;
border:none;
border-radius:8px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/J1mKppg.png" class="logo">
<div>UJIAN PENDIDIKAN KESETARAAN (UPK)</div>
<div>PKBM Ristek Nusantara Jaya</div>
  <div>UPK PKN</div>
<div id="timer">90:00</div>
</div>

<div class="container">

<section id="identitasSection">
<h3>Nama Peserta</h3>
<input id="nama">
<button onclick="mulai()">Mulai Ujian</button>
</section>

<section id="isianSection" class="hidden">
<h3>Isian</h3>
<ul id="isianlist"></ul>
<button onclick="next('pgSection')">Lanjut ke PG</button>
</section>

<section id="pgSection" class="hidden">
<h3>Pilihan Ganda</h3>
<ul id="pglist"></ul>
<button onclick="next('uraianSection')">Lanjut ke Uraian</button>
<button onclick="next('isianSection')">⬅ Kembali</button>
</section>

<section id="uraianSection" class="hidden">
<h3>Uraian</h3>
<ul id="uraianlist"></ul>
<button onclick="next('pgSection')">⬅ Kembali</button>
<button onclick="kirim()">Kirim Jawaban</button>
</section>

</div>

<script>
const MAPEL="PKN";
const URL="https://script.google.com/macros/s/AKfycbxM3g6okiRl6T4lY6-oI8_0TnDDHbr1DWvX-9NIhPi7lX42qlRzXNJIZ6LN-9i5DTXF/exec";
const KEY_DATA="UPK_"+MAPEL+"_DATA";

let waktu=0,interval;

["Hak asasi manusia yang dijamin dalam UUD 1945 mencakup, kecuali:",["Hak hidup","Hak kepemilikan pribadi","Hak monopoli atas sumber daya alam","Hak berpendapat"]],
["Prinsip demokrasi yang diterapkan di Indonesia adalah:",["Demokrasi liberal","Demokrasi terpimpin","Demokrasi pancasila","Demokrasi totaliter"]],
["Berikut ini yang bukan merupakan ciri negara hukum adalah:",["Adanya perlindungan HAM","Pemerintah berdasarkan kekuasaan mutlak","Kekuasaan kehakiman yang bebas","Supremasi hukum"]],
["Dalam sistem pemerintahan presidensial, presiden berperan sebagai:",["Kepala negara dan kepala pemerintahan","Hanya kepala negara","Hanya kepala pemerintahan","Ketua Mahkamah Agung"]],
["Salah satu kewajiban warga negara menurut UUD 1945 adalah:",["Mendapatkan pendidikan","Membayar pajak","Memilih presiden","Mendapatkan pekerjaan"]],
["Contoh perilaku yang mencerminkan sikap toleransi adalah:",["Memaksakan kehendak","Menghargai perbedaan pendapat","Menyebarkan berita hoaks","Mendiskriminasi kelompok minoritas"]],
["Penegakan hukum di Indonesia sering terhambat oleh:",["Transparansi","Korupsi","Partisipasi publik","Supremasi hukum"]],
["Salah satu tantangan demokrasi di era digital adalah:",["Kurangnya sumber daya manusia","Penyebaran disinformasi","Keterbatasan teknologi","Tingginya partisipasi pemilih"]],
["Fungsi utama DPR adalah:",["Mengawasi presiden","Membentuk undang-undang","Melantik presiden","Mengadili pelanggaran HAM"]],
["Pelanggaran hak asasi manusia dapat diadukan ke:",["Kementerian Pendidikan","Komnas HAM","Mahkamah Agung","KPU"]],
["Salah satu bentuk ancaman terhadap integrasi nasional adalah:",["Persatuan bangsa","Konflik horizontal","Kerja sama antar daerah","Toleransi"]],
["Hak berorganisasi diatur dalam:",["Pasal 28 UUD 1945","Pasal 31 UUD 1945","Pasal 33 UUD 1945","Pasal 37 UUD 1945"]],
["Semboyan Bhinneka Tunggal Ika mencerminkan:",["Persatuan dalam perbedaan","Keseragaman budaya","Ketidakadilan sosial","Ketidaksetaraan gender"]],
["Lembaga yang mengawasi pelaksanaan pemilu adalah:",["KPU","Bawaslu","DPR","Mahkamah Agung"]],
["Salah satu bentuk partisipasi aktif warga negara adalah:",["Tidak memilih dalam pemilu","Terlibat dalam kegiatan sosial","Mengabaikan aturan lalu lintas","Membayar pungutan liar"]],
["Prinsip persamaan di hadapan hukum berarti:",["Hukum hanya berlaku untuk pejabat","Semua orang sama di mata hukum","Hukum mudah diubah","Hukum tidak mengikat"]],
["Salah satu dampak globalisasi terhadap identitas nasional adalah:",["Penguatan budaya lokal","Hilangnya budaya asli","Pemantapan nilai-nilai nasional","Meningkatnya nasionalisme"]],

["Kewenangan Mahkamah Agung adalah:",["Mengadili sengketa hasil pemilu","Menguji undang-undang terhadap UUD","Mengadili kasasi perkara perdata dan pidana","Melantik presiden"]],
["Salah satu tujuan otonomi daerah adalah:",["Memperkuat sentralisasi kekuasaan","Meningkatkan partisipasi masyarakat","Mengurangi peran DPRD","Menambah beban pemerintah pusat"]],
["Penyalahgunaan kekuasaan oleh pejabat publik disebut juga:",["Demokrasi","Korupsi","Reformasi","Desentralisasi"]],
["Contoh pengamalan nilai keadilan sosial adalah:",["Membeda-bedakan teman","Membantu korban bencana","Menolak membantu orang miskin","Mengabaikan hak orang lain"]],
["Lembaga yang berfungsi sebagai pengawas eksternal pemerintah adalah:",["BPK","KPK","Polri","BIN"]],
["Prinsip supremasi hukum berarti:",["Semua warga negara harus taat hukum","Hukum dibuat untuk pejabat saja","Hukum bersifat diskriminatif","Hukum bisa diabaikan"]],
["Hak menyatakan pendapat secara bebas diatur dalam:",["Pasal 27 UUD 1945","Pasal 28E UUD 1945","Pasal 29 UUD 1945","Pasal 31 UUD 1945"]],
["Salah satu bentuk perilaku anti korupsi adalah:",["Memberikan suap","Melaporkan tindak pidana korupsi","Menyembunyikan kejahatan","Membiarkan penyalahgunaan wewenang"]],
["Kebebasan pers di Indonesia dijamin oleh:",["UUD 1945 Pasal 28F","UUD 1945 Pasal 33","UUD 1945 Pasal 36C","UUD 1945 Pasal 37"]],
["Salah satu hak warga negara dalam bidang pendidikan adalah:",["Hak memperoleh pendidikan","Hak membatasi pendidikan","Hak memberhentikan guru","Hak membatasi akses informasi"]],
["Peran aktif dalam menjaga persatuan bangsa dapat diwujudkan dengan:",["Menghargai perbedaan budaya","Saling mencela","Menghasut permusuhan","Mengabaikan aturan"]],
["Kebijakan publik yang baik harus:",["Menguntungkan kelompok tertentu saja","Berdasarkan aspirasi masyarakat","Berlaku diskriminatif","Mengabaikan kepentingan rakyat"]],
["Salah satu tantangan dalam penegakan HAM di Indonesia adalah:",["Lemahnya penegakan hukum","Banyaknya lembaga HAM","Terbatasnya jumlah penduduk","Rendahnya partisipasi masyarakat"]],
["Hak memperoleh pekerjaan dan penghidupan yang layak dijamin dalam:",["Pasal 27 ayat 2 UUD 1945","Pasal 29 UUD 1945","Pasal 31 UUD 1945","Pasal 33 UUD 1945"]],
["Tugas utama Komisi Yudisial adalah:",["Mengangkat hakim agung","Mengawasi perilaku hakim","Mengadili perkara pidana","Membentuk undang-undang"]],
["Salah satu contoh pelanggaran HAM berat adalah:",["Pencurian","Pembunuhan massal","Penipuan","Perusakan fasilitas umum"]],
["Lembaga yang menangani pemberantasan tindak pidana korupsi di Indonesia adalah:",["KPK","BPK","KPU","DPR"]],
["Penerapan nilai gotong royong dalam kehidupan masyarakat dapat dilakukan dengan:",["Bekerja sama membersihkan lingkungan","Membiarkan sampah menumpuk","Meminta bantuan tanpa partisipasi","Mengabaikan kerja bakti"]],
["Prinsip keadilan dalam demokrasi berarti:",["Semua kebijakan harus menguntungkan pemerintah","Setiap warga negara mendapat perlakuan sama","Hanya kelompok tertentu yang mendapat hak istimewa","Pemerintah berkuasa mutlak"]],
["Pilihan yang mencerminkan pengamalan Pancasila sila kedua adalah:",["Saling membantu teman yang mengalami kesulitan","Menyebar kebencian di media sosial","Menolak berdiskusi","Mengabaikan hak orang lain"]],
["Salah satu bentuk pelaksanaan nilai demokrasi dalam sekolah adalah:",["Pemilihan ketua OSIS secara langsung","Penunjukan ketua kelas oleh guru","Pengambilan keputusan oleh satu orang","Tidak melibatkan siswa dalam musyawarah"]],
["Pentingnya supremasi hukum adalah untuk:",["Melindungi hak warga negara","Memperkuat kekuasaan","Mengurangi partisipasi masyarakat","Mengabaikan keadilan"]],
["Salah satu hambatan dalam penerapan otonomi daerah adalah:",["Ketimpangan sumber daya","Tingginya partisipasi masyarakat","Peningkatan infrastruktur","Pelayanan publik meningkat"]],
["Implementasi nilai-nilai Pancasila dalam kehidupan sehari-hari dapat diwujudkan melalui:",["Perilaku intoleran","Saling menghargai perbedaan","Menolak keragaman budaya","Mengutamakan kepentingan pribadi"]]
];

let soalUraian=[
"Jelaskan bagaimana prinsip musyawarah mufakat dapat diterapkan dalam menyelesaikan konflik di lingkungan sekolah!",
"Analisislah dampak positif dan negatif globalisasi terhadap integrasi nasional Indonesia!",
"Bagaimana upaya yang dapat dilakukan masyarakat untuk mencegah pelanggaran hak asasi manusia di lingkungan sekitar?",
"Berikan contoh konkret penerapan nilai keadilan sosial dalam kehidupan sehari-hari dan jelaskan alasannya!",
"Jelaskan pentingnya peran serta generasi muda dalam menjaga persatuan dan kesatuan bangsa di era digital!"
];

/* ================= RENDER ================= */
function render(){
soalIsian.forEach((s,i)=>{
isianlist.innerHTML+=`<li>${i+1}. ${s}<textarea id="isian${i}"></textarea></li>`;
});
soalPG.forEach((s,i)=>{
let html=`<li>${i+1}. ${s[0]}`;
s[1].forEach((o,j)=>{
let h=["A","B","C","D"][j];
html+=`<div class="opsi" data-name="q${i}" data-value="${h}">${h}. ${o}</div>`;
});
html+=`</li>`;
pglist.innerHTML+=html;
});
soalUraian.forEach((s,i)=>{
uraianlist.innerHTML+=`<li>${i+1}. ${s}<textarea id="uraian${i}"></textarea></li>`;
});
}

/* ================= VALIDASI ================= */
function next(id){

if(id==="pgSection"){
for(let i=0;i<soalIsian.length;i++){
let el=document.getElementById("isian"+i);
if(!el.value.trim()){
alert("Isi semua ISIAN!");
el.scrollIntoView();
return;
}
}
}

if(id==="uraianSection"){
for(let i=0;i<soalPG.length;i++){
if(!document.querySelector(`.opsi.selected[data-name="q${i}"]`)){
alert("Jawab semua PG!");
document.querySelector(`[data-name="q${i}"]`).scrollIntoView();
return;
}
}
}

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

/* ================= MULAI ================= */
function mulai(){

if(!nama.value.trim()){
alert("Nama wajib diisi!");
nama.focus();
return;
}

simpan();

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById("isianSection").classList.remove("hidden");

waktu=localStorage.getItem(KEY_TIME)||5400;

interval=setInterval(()=>{
waktu--;
localStorage.setItem(KEY_TIME,waktu);

let m=Math.floor(waktu/60),s=waktu%60;
timer.innerHTML=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;

if(waktu<=0){
alert("Waktu habis");
kirim();
}
},1000);
}

/* ================= SIMPAN ================= */
function simpan(){
let data={nama:nama.value,isian:[],pg:[],uraian:[]};

soalIsian.forEach((_,i)=>data.isian.push(document.getElementById("isian"+i).value));
soalPG.forEach((_,i)=>{
let p=document.querySelector(`.opsi.selected[data-name="q${i}"]`);
data.pg.push(p?p.dataset.value:"");
});
soalUraian.forEach((_,i)=>data.uraian.push(document.getElementById("uraian"+i).value));

localStorage.setItem(KEY_DATA,JSON.stringify(data));
}

document.addEventListener("input",simpan);

document.addEventListener("click",e=>{
if(e.target.classList.contains("opsi")){
let name=e.target.dataset.name;
document.querySelectorAll(`[data-name="${name}"]`).forEach(el=>el.classList.remove("selected"));
e.target.classList.add("selected");
simpan();
}
});

/* ================= LOAD ================= */
function loadData(){
let data=JSON.parse(localStorage.getItem(KEY_DATA)||"{}");

if(data.nama){
nama.value=data.nama;
nama.disabled=true;
}

if(data.isian){
data.isian.forEach((v,i)=>{
let el=document.getElementById("isian"+i);
if(el) el.value=v;
});
}

if(data.pg){
data.pg.forEach((v,i)=>{
if(v){
let el=document.querySelector(`.opsi[data-name="q${i}"][data-value="${v}"]`);
if(el) el.classList.add("selected");
}
});
}

if(data.uraian){
data.uraian.forEach((v,i)=>{
let el=document.getElementById("uraian"+i);
if(el) el.value=v;
});
}
}

/* ================= KIRIM ================= */
function kirim(){

if(!nama.value.trim()){
alert("Nama belum diisi!");
return;
}

for(let i=0;i<soalUraian.length;i++){
if(!document.getElementById("uraian"+i).value.trim()){
alert("Isi semua URAIAN!");
return;
}
}

// 🔥 AMBIL DATA
let data={
nama:nama.value,
mapel:MAPEL,
isian:[],
pg:[],
uraian:[]
};

soalIsian.forEach((_,i)=>{
data.isian.push(document.getElementById("isian"+i).value);
});

soalPG.forEach((_,i)=>{
let p=document.querySelector(`.opsi.selected[data-name="q${i}"]`);
data.pg.push(p?p.dataset.value:"");
});

soalUraian.forEach((_,i)=>{
data.uraian.push(document.getElementById("uraian"+i).value);
});

// 🔥 KIRIM KE GAS
fetch(URL,{ 
  method:"POST",
  body:JSON.stringify(data)
})
.then(r=>r.text())
.then(t=>{
alert("Server: "+t);

localStorage.removeItem(KEY_DATA);
localStorage.removeItem(KEY_TIME);
})
.catch(err=>{
alert("Error: "+err);
});
}
/* ================= INIT ================= */
window.onload=function(){
render();
loadData();
if(localStorage.getItem(KEY_DATA)){
let data=JSON.parse(localStorage.getItem(KEY_DATA));
if(data.nama){
nama.value=data.nama;
nama.disabled=true;

// 🔥 UBAH TOMBOL
document.querySelector("#identitasSection button").innerText="Lanjutkan Ujian";
}
}
};
</script>

</body>
</html>
