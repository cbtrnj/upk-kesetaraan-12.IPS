<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal CBT UPK</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html { height: 100%; }
    body { 
      font-family: 'Poppins', sans-serif; 
      background: linear-gradient(135deg, #0066cc 0%, #0052a3 50%, #003d82 100%);
      height: 100%;
      margin: 0;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 500px;
      width: 100%;
      box-sizing: border-box;
    }

    .card {
      background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
      border-radius: 10px;
      padding: 16px 14px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 12px;
    }

    .logo-img {
      width: 60px;
      height: 60px;
      margin: 0 auto 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .logo-img img {
      width: 75%;
      height: 75%;
      object-fit: contain;
    }

    .logo-img i {
      width: 32px;
      height: 32px;
      color: #60a5fa;
    }

    .text-section h1 {
      font-size: 18px;
      font-weight: 800;
      color: #ffffff;
      margin: 0 0 3px 0;
    }

    .text-section p {
      font-size: 11px;
      color: #dbeafe;
      margin: 3px 0;
      line-height: 1.3;
    }

    .text-section .desc {
      font-size: 10px;
      color: #bfdbfe;
      line-height: 1.4;
      margin-top: 6px;
    }

    .year-badge {
      display: inline-block;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      padding: 3px 10px;
      border-radius: 14px;
      font-size: 9px;
      font-weight: 700;
      margin-top: 6px;
    }

    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin: 12px 0;
    }

    .feature {
      background: rgba(255, 255, 255, 0.08);
      padding: 8px;
      border-radius: 7px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .feature i {
      width: 18px;
      height: 18px;
      color: #60a5fa;
      margin: 0 auto 3px;
      display: block;
    }

    .feature-text {
      font-size: 9px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.2;
    }

    .btn-start {
      width: 100%;
      padding: 10px 18px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin-top: 12px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
      font-family: 'Poppins', sans-serif;
      -webkit-appearance: none;
      appearance: none;
    }

    .btn-start:active {
      opacity: 0.95;
    }

    .btn-start i {
      width: 14px;
      height: 14px;
    }

    .footer-text {
      text-align: center;
      margin-top: 10px;
      font-size: 9px;
      color: #bfdbfe;
      line-height: 1.3;
    }

    /* Tablet */
    @media (min-width: 600px) {
      .card {
        padding: 22px 20px;
      }

      .text-section h1 {
        font-size: 22px;
      }

      .text-section p {
        font-size: 12px;
      }

      .text-section .desc {
        font-size: 11px;
      }

      .logo-img {
        width: 70px;
        height: 70px;
      }

      .logo-img i {
        width: 36px;
        height: 36px;
      }

      .btn-start {
        padding: 11px 22px;
        font-size: 13px;
      }

      .feature {
        padding: 10px;
      }

      .feature i {
        width: 20px;
        height: 20px;
      }

      .feature-text {
        font-size: 10px;
      }
    }

    /* iPad dan desktop */
    @media (min-width: 768px) {
      .card {
        padding: 32px 28px;
      }

      .text-section h1 {
        font-size: 26px;
      }

      .text-section p {
        font-size: 13px;
      }

      .text-section .desc {
        font-size: 12px;
      }

      .logo-img {
        width: 80px;
        height: 80px;
      }

      .logo-img i {
        width: 40px;
        height: 40px;
      }

      .btn-start {
        padding: 12px 26px;
        font-size: 14px;
      }

      .feature {
        padding: 12px;
      }

      .feature i {
        width: 22px;
        height: 22px;
      }

      .feature-text {
        font-size: 11px;
      }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="container">
   <div class="card">
    <div class="logo-section">
     <div class="logo-img">
      <img id="logo-img" src="https://i.imgur.com/J1mKppg.png" alt="Logo" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"> <i id="logo-icon" data-lucide="graduation-cap" style="display: none;"></i>
     </div>
    </div>
    <div class="text-section">
     <h1 id="portal-title">Ruang Ujian RNJ</h1>
     <p id="lembaga-name">PKBM Ristek Nusantara Jaya</p>
     <p id="deskripsi" class="desc">Ujian Pendidikan Kesetaraan</p>
     <div class="year-badge" id="tahun-ujian">
      Tahun 2026
     </div>
    </div>
    <div class="features">
     <div class="feature">
      <i data-lucide="zap"></i>
      <div class="feature-text">
       Cepat &amp; Lancar
      </div>
     </div>
     <div class="feature">
      <i data-lucide="shield"></i>
      <div class="feature-text">
       Aman Terpercaya
      </div>
     </div>
     <div class="feature">
      <i data-lucide="clock"></i>
      <div class="feature-text">
       Fleksibel Waktu
      </div>
     </div>
     <div class="feature">
      <i data-lucide="check-circle"></i>
      <div class="feature-text">
       Hasil Instan
      </div>
     </div>
    </div><button class="btn-start" onclick="startExam()"> <i data-lucide="play"></i> <span>Mulai Ujian</span> </button>
    <div class="footer-text">
     Siap untuk ujianmu? Pastikan koneksi internet stabil sebelum memulai
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      logo_url: 'https://via.placeholder.com/90?text=Logo',
      lembaga_name: 'PKBM Ristek Nusantara Jaya',
      portal_title: 'Ruang Ujian RNJ',
      tahun_ujian: '2026',
      deskripsi: 'Ujian Pendidikan Kesetaraan'
    };

    function startExam() {
      // Siap diintegrasikan dengan halaman ujian
      console.log('Mulai ujian');
    }

    // Element SDK initialization
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          document.getElementById('lembaga-name').textContent = config.lembaga_name || defaultConfig.lembaga_name;
          document.getElementById('portal-title').textContent = config.portal_title || defaultConfig.portal_title;
          document.getElementById('tahun-ujian').textContent = 'Tahun ' + (config.tahun_ujian || defaultConfig.tahun_ujian);
          document.getElementById('deskripsi').textContent = config.deskripsi || defaultConfig.deskripsi;
          
          // Update logo
          const logoImg = document.getElementById('logo-img');
          logoImg.src = config.logo_url || defaultConfig.logo_url;
          logoImg.onerror = function() {
            this.style.display = 'none';
            document.getElementById('logo-icon').style.display = 'flex';
          };
        },
        mapToCapabilities: () => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['logo_url', config.logo_url || defaultConfig.logo_url],
          ['lembaga_name', config.lembaga_name || defaultConfig.lembaga_name],
          ['portal_title', config.portal_title || defaultConfig.portal_title],
          ['tahun_ujian', config.tahun_ujian || defaultConfig.tahun_ujian],
          ['deskripsi', config.deskripsi || defaultConfig.deskripsi]
        ])
      });
    }

    lucide.createIcons();
  </script>

</html>
