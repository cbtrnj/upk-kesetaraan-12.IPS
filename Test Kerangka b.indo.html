<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Bahasa Indonesia</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #007bff;
  color: white;
  text-align: center;
  padding: 10px 5px;
  z-index: 1000;
}

/* LOGO */
.logo {
  width: 50px;
  display: block;
  margin: 0 auto 5px;
}

/* JUDUL */
.header h3 {
  margin: 5px 0 2px;
  font-size: 16px;
}

/* SUB */
.subjudul {
  margin: 0;
  font-size: 12px;
}

/* TIMER */
#timer {
  background: red;
  padding: 6px;
  margin-top: 5px;
  font-weight: bold;
}

/* CONTENT */
.content {
  position: fixed;
  top: 150px;
  bottom: 0;
  left: 0;
  right: 0;
  overflow-y: auto;
  padding: 15px;
  max-width: 800px;
  margin: auto;
}

/* OPSI CBT */
.opsi {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  margin: 8px 0;
  border: 2px solid #ddd;
  border-radius: 10px;
  cursor: pointer;
}

.opsi input {
  display: none;
}

.huruf {
  background: #eee;
  padding: 6px 10px;
  border-radius: 6px;
  font-weight: bold;
}

.opsi:hover {
  background: #f0f8ff;
}

.opsi:has(input:checked) {
  border-color: #007bff;
  background: #e6f0ff;
}

.opsi input:checked + .huruf {
  background: #007bff;
  color: white;
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  margin-top: 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
}

/* MOBILE */
@media(max-width:600px){
  .content { top:170px; }
  .opsi { font-size:14px; padding:10px; }
}
</style>
</head>

<body>

<div class="header">
    <img src="https://i.imgur.com/J1mKppg.png" class="logo">
    <h3>UJIAN PENDIDIKAN KESETARAAN (UPK)</h3>
    <p class="subjudul">PKBM Ristek Nusantara Jaya</p>
    <div id="timer">90:00</div>
</div>

<div class="content">
<ol id="soal"></ol>
<button onclick="kirim()">Kirim Jawaban</button>
</div>

<script>

/* ================= SOAL ================= */
const soal = [
{
t:"Teknologi digital telah mengubah cara orang berkomunikasi... termasuk jenis paragraf...",
o:["Narasi","Deskripsi","Argumentasi","Persuasi"]
},
{
t:"Ciri utama teks prosedur adalah...",
o:["Menguraikan langkah-langkah secara berurutan","Mengandung unsur cerita","Menjelaskan ilmiah","Membujuk"]
},
{
t:"Fungsi kalimat pembuka pidato...",
o:["Tujuan","Salam","Argumen","Penutup"]
}
];

/* ================= KUNCI ================= */
const kunci = ["C","A","B"];

/* ================= RENDER ================= */
const container = document.getElementById("soal");

soal.forEach((s,i)=>{
  let li = document.createElement("li");
  li.innerHTML = `<p>${s.t}</p>`;

  s.o.forEach((ops,j)=>{
    let huruf = String.fromCharCode(65+j);
    li.innerHTML += `
    <label class="opsi">
      <input type="radio" name="q${i}" value="${huruf}">
      <span class="huruf">${huruf}</span>
      <span>${ops}</span>
    </label>`;
  });

  container.appendChild(li);
});

/* ================= TIMER ================= */
let waktu = 90*60;

setInterval(()=>{
  waktu--;
  let m = Math.floor(waktu/60);
  let s = waktu%60;

  document.getElementById("timer").innerText =
    m + ":" + (s<10?"0":"") + s;

},1000);

/* ================= SUBMIT ================= */
function kirim(){
  let benar = 0;

  soal.forEach((s,i)=>{
    let pilih = document.querySelector('input[name="q'+i+'"]:checked');
    if(pilih && pilih.value === kunci[i]) benar++;
  });

  alert("Nilai: " + benar + " / " + soal.length);
}

</script>

</body>
</html>
