  tipe:"pg",
  bacaan:"Lingkungan yang bersih akan menciptakan suasana yang nyaman dan sehat. Oleh karena itu, setiap individu harus menjaga kebersihan.",
  t:"Ide pokok paragraf tersebut adalah...",
  o:[

{tipe:"pg", t:"Kalimat berikut yang termasuk perintah adalah...", o:[

    // ================= SOAL URAIAN BAHASA INDONESIA =================
soalData.push(
  { tipe:"uraian", q:"Jelaskan perbedaan utama antara teks eksposisi dan teks argumentasi beserta contohnya masing-masing!" },
  { tipe:"uraian", q:"Berikan analisis tentang pentingnya penggunaan bahasa Indonesia yang baik dan benar di era digital saat ini!" },
  { tipe:"uraian", q:"Bacalah penggalan berikut:\n“Banyak siswa yang lebih suka menonton video pembelajaran daripada membaca buku pelajaran.”\nAnalisislah fenomena tersebut beserta dampaknya terhadap kemampuan literasi siswa!" },
  { tipe:"uraian", q:"Buatlah sebuah paragraf argumentatif yang membahas manfaat literasi digital untuk generasi muda!" },
  { tipe:"uraian", q:"Jelaskan langkah-langkah utama dalam menulis teks pidato yang efektif dan menarik!" }
);

// ================= STATE =================
let index = 0;
let jawaban = [];

// ================= LOAD DATA (ANTI REFRESH) =================
let simpanJawaban = localStorage.getItem("jawaban");
let simpanIndex = localStorage.getItem("index");

if(simpanJawaban){
    jawaban = JSON.parse(simpanJawaban);
}

if(simpanIndex){
    index = parseInt(simpanIndex);
}

// ================= TIMER =================
let waktu = 90 * 60; // 90 menit
let intervalTimer;

function startTimer(){
    intervalTimer = setInterval(() => {
        let menit = Math.floor(waktu / 60);
        let detik = waktu % 60;

        document.getElementById("timer").innerText =
            `${menit}:${detik < 10 ? "0"+detik : detik}`;

        waktu--;

        if(waktu < 0){
            clearInterval(intervalTimer);
            alert("Waktu habis!");
            kirim();
        }
    }, 1000);
}

// ================= MULAI =================
function mulai(){
    let nama = document.getElementById("nama").value;

    if(nama.trim()==""){
        alert("Isi nama dulu!");
        return;
    }

    document.getElementById("login").style.display="none";
    document.getElementById("quiz").style.display="block";

    startTimer();
    tampil();
}

// ================= TAMPIL SOAL =================
function tampil(){
    let s = soalData[index];
    let html = "";

    if(s.bacaan){
        html += `<p><i>${s.bacaan}</i></p>`;
    }

    html += `<p><b>${index+1}. ${s.t}</b></p>`;

    if(s.tipe=="pg"){
        s.o.forEach((opt,i)=>{
            let checked = jawaban[index]==i ? "checked":"";
            html += `<label>
                <input type="radio" name="pilih" value="${i}" ${checked}>
                ${opt}
            </label><br>`;
        });
    }

    if(s.tipe=="isian"){
        let isi = jawaban[index] || "";
        html += `<input type="text" id="isian" value="${isi}">`;
    }

    document.getElementById("soal").innerHTML = html;

    // progress bar
    let persen = (index/soalData.length)*100;
    document.getElementById("bar").style.width = persen+"%";
}

// ================= NEXT =================
function next(){
    let s = soalData[index];

    if(s.tipe=="pg"){
        let pilih = document.querySelector('input[name="pilih"]:checked');
        if(!pilih){ alert("Pilih jawaban!"); return; }
        jawaban[index] = parseInt(pilih.value);
    }

    if(s.tipe=="isian"){
        let isi = document.getElementById("isian").value;
        if(isi.trim()==""){ alert("Isi jawaban!"); return; }
        jawaban[index] = isi;
    }

    // simpan
    localStorage.setItem("jawaban", JSON.stringify(jawaban));

    index++;
    localStorage.setItem("index", index);

    if(index < soalData.length){
        tampil();
    } else {
        kirim();
    }
}

// ================= PREV =================
function prev(){
    if(index>0){
        index--;
        localStorage.setItem("index", index);
        tampil();
    }
}

// ================= KIRIM =================
function kirim(){
    let skor = 0;

    soalData.forEach((s,i)=>{
        if(s.tipe=="pg" && s.a === jawaban[i]){
            skor++;
        }
    });

    fetch("https://script.google.com/macros/s/AKfycbzm1SEbNBA9Q6j_-hqvHdWbMuoLxPhyrPlWRpzSZzkeicPflKSk46hqy96kr7GBg11j3A/exec", {
        method:"POST",
        body:JSON.stringify({
            nama: document.getElementById("nama").value,
            skor: skor,
            jawaban: jawaban.join("|")
        })
    });

    // hapus storage
    localStorage.removeItem("jawaban");
    localStorage.removeItem("index");

    document.body.innerHTML =
    "<h2 style='text-align:center;'>Jawaban berhasil dikirim</h2>";
}

</script>
