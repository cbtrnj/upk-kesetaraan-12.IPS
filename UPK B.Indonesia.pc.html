<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT PKN</title>

<style>
*{box-sizing:border-box;}
html,body{
margin:0;
font-family:Arial;
background:#f4f4f4;
overflow-x:hidden; /* 🔥 hanya scroll atas bawah */
}

.header{
position:fixed;
top:0;
width:100%;
background:#007bff;
color:#fff;
text-align:center;
padding:10px;
z-index:999;
}

.logo{
width:70px;
display:block;
margin:auto;
}

.timer{
font-size:18px;
font-weight:bold;
margin-top:5px;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
margin-top:200px;
}

li{
margin-bottom:55px; /* 🔥 jarak soal lega */
line-height:1.6;
}

.opsi{
display:block;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
background:#fff;
cursor:pointer;
}

.opsi.selected{
background:#28a745;
color:#fff;
border-color:#28a745;
}

textarea,input{
width:100%;
padding:12px;
margin-top:8px;
font-size:15px;
}

textarea{
min-height:150px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
background:#007bff;
color:#fff;
border:none;
border-radius:8px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/J1mKppg.png" class="logo">
<div>UJIAN PENDIDIKAN KESETARAAN (UPK)</div>
<div>PKBM Ristek Nusantara Jaya</div>
  <div>UPK PKN</div>
<div id="timer">90:00</div>
</div>

<div class="container">

<section id="identitasSection">
<h3>Nama Peserta</h3>
<input id="nama">
<button onclick="mulai()">Mulai Ujian</button>
</section>

<section id="isianSection" class="hidden">
<h3>Isian</h3>
<ul id="isianlist"></ul>
<button onclick="next('pgSection')">Lanjut ke PG</button>
</section>

<section id="pgSection" class="hidden">
<h3>Pilihan Ganda</h3>
<ul id="pglist"></ul>
<button onclick="next('uraianSection')">Lanjut ke Uraian</button>
<button onclick="next('isianSection')">⬅ Kembali</button>
</section>

<section id="uraianSection" class="hidden">
<h3>Uraian</h3>
<ul id="uraianlist"></ul>
<button onclick="next('pgSection')">⬅ Kembali</button>
<button onclick="kirim()">Kirim Jawaban</button>
</section>

</div>

<script>
const MAPEL="BINDO";
const URL="https://script.google.com/macros/s/AKfycbxM3g6okiRl6T4lY6-oI8_0TnDDHbr1DWvX-9NIhPi7lX42qlRzXNJIZ6LN-9i5DTXF/exec";
const KEY_DATA="UPK_"+MAPEL+"_DATA";
const KEY_TIME="UPK_"+MAPEL+"_TIME";

let waktu=0,interval;

/* ================= SOAL ================= */
let soalIsian=[
"Dalam menulis surat lamaran pekerjaan, penggunaan bahasa yang _____________ sangat diperlukan agar surat terkesan profesional.",
"Kata “implementasi” dalam konteks pendidikan bermakna _____________.",
"Teks eksplanasi bertujuan untuk _____________ proses terjadinya suatu fenomena.",
"Sinonim dari kata “abstrak” adalah _____________.",
"Paragraf argumentatif biasanya mengandung _____________ yang mendukung pendapat penulis."
];

let soalPG=[
["Bacalah kutipan berikut: 'Teknologi digital telah mengubah cara orang berkomunikasi, bekerja, dan belajar. Namun, tantangan terbesar adalah bagaimana memanfaatkan teknologi secara bijak agar tidak menimbulkan dampak negatif.' Pernyataan di atas termasuk jenis paragraf...",["Narasi","Deskripsi","Argumentasi","Persuasi"]],
["Berikut ini yang merupakan ciri utama teks prosedur adalah...",["Menguraikan langkah-langkah secara berurutan","Mengandung unsur cerita dan tokoh","Menjelaskan peristiwa secara ilmiah","Membujuk pembaca agar melakukan sesuatu"]],
["Dalam teks pidato, fungsi kalimat pembuka adalah...",["Menyampaikan tujuan pidato","Mengucapkan salam dan sapaan","Memberikan argumen","Menyimpulkan isi pidato"]],
["Bacalah kalimat berikut: 'Jika semua siswa membuang sampah pada tempatnya, sekolah akan menjadi bersih.' Makna implisit dari kalimat tersebut adalah...",["Siswa tidak peduli kebersihan","Kebersihan sekolah tergantung perilaku siswa","Tempat sampah tidak cukup","Sekolah tidak butuh tempat sampah"]],
["Kata 'transparan' pada kalimat 'Pemerintah harus bersikap transparan dalam pengelolaan dana publik' berarti...",["Jelas dan terbuka","Tertutup rapat","Berbelit-belit","Sulit dimengerti"]],
["Cermati teks berikut: 'Siswa SMA Negeri 1 Jakarta berhasil memenangkan lomba debat tingkat nasional.' Kata 'berhasil' dalam kalimat tersebut berfungsi sebagai...",["Kata benda","Kata sifat","Kata kerja","Kata keterangan"]],
["Bacalah penggalan teks berikut: 'Selain itu, penggunaan kendaraan listrik dapat mengurangi polusi udara.' Ide pokok paragraf di atas adalah...",["Polusi udara meningkat","Kendaraan listrik menambah polusi","Penggunaan kendaraan listrik dapat mengurangi polusi udara","Kendaraan listrik tidak ramah lingkungan"]],
["Dalam debat, penyampaian sanggahan yang baik harus disertai dengan...",["Emosi tinggi","Bukti dan alasan logis","Nada suara keras","Kata-kata kasar"]],
["Kalimat efektif di bawah ini adalah...",["Karena hujan deras, sehingga banjir melanda kota","Banjir melanda kota karena hujan deras","Banjir karena hujan deras melanda kota","Karena banjir, hujan deras melanda kota"]],
["Sinonim kata 'konklusi' adalah...",["Penjelasan","Kesimpulan","Perbandingan","Penyangkalan"]],
["Dalam cerpen, konflik berfungsi untuk...",["Membuat cerita semakin menarik","Mengulang kejadian","Menjelaskan latar","Menambah jumlah tokoh"]],
["Bacalah kalimat berikut: 'Dia membaca buku dengan sungguh-sungguh.' Kata yang berfungsi sebagai keterangan cara pada kalimat di atas adalah...",["Dia","Membaca","Buku","Sungguh-sungguh"]],
["Teks negosiasi biasanya berisi tentang...",["Penyelesaian masalah bersama","Perdebatan tanpa akhir","Pengutaraan perasaan","Penjelasan ilmiah"]],
["Bacalah kutipan berikut: 'Masyarakat harus sadar pentingnya penggunaan masker di masa pandemi.' Kata 'harus' pada kalimat tersebut bermakna...",["Anjuran","Larangan","Keinginan","Kewajiban"]],
["Paragraf deduktif adalah paragraf yang...",["Ide pokoknya terletak di akhir paragraf","Ide pokoknya tersebar di seluruh paragraf","Ide pokoknya di awal paragraf","Tidak memiliki ide pokok"]],
["Kata baku dari 'analisa' adalah...",["Analisa","Analisis","Menganalisa","Analisisan"]],
["Teks eksposisi bertujuan untuk...",["Mempengaruhi pembaca","Menjelaskan informasi","Menghibur pembaca","Menyampaikan cerita"]],
["Kalimat yang menggunakan majas personifikasi adalah...",["Matahari terbenam di ufuk barat","Angin berbisik lembut di telingaku","Air sungai mengalir deras","Langit berwarna biru cerah"]],
["Dalam surat dinas, hal yang tidak boleh dilupakan adalah...",["Salam penutup","Nama penerima","Alamat pengirim","Tanda tangan"]],
["Bacalah kalimat berikut: 'Para siswa diharapkan dapat meningkatkan literasi digital.' Kata 'literasi digital' bermakna...",["Kemampuan membaca buku fisik","Kemampuan menggunakan teknologi informasi","Belajar menulis tangan","Membaca novel daring"]],
["Dalam cerpen, sudut pandang orang ketiga serba tahu berarti...",["Penulis sebagai tokoh utama","Narator mengetahui segala hal tentang tokoh","Cerita dari sudut pandang 'aku'","Tokoh menceritakan dirinya sendiri"]],
["Kalimat berikut yang termasuk kalimat pasif adalah...",["Siswa membaca buku di perpustakaan","Buku itu dibaca oleh siswa","Guru menjelaskan materi pelajaran","Teman-teman bermain bola"]],
["Bacalah kutipan berikut: 'Sampah plastik menimbulkan kerusakan lingkungan yang serius.' Kata 'menimbulkan' pada kalimat tersebut bermakna...",["Mengurangi","Membuat munculnya","Menghilangkan","Mengolah"]],
["Dalam teks laporan hasil observasi, bagian pernyataan umum berisi tentang...",["Ciri-ciri khusus objek","Proses terjadinya objek","Penjelasan umum tentang objek","Hasil eksperimen"]],
["Bacalah kalimat berikut: 'Karena tidak belajar, hasil ujian Rina kurang memuaskan.' Klausa sebab pada kalimat tersebut adalah...",["Karena tidak belajar","Hasil ujian Rina kurang memuaskan","Karena hasil ujian","Rina kurang memuaskan"]],
["Kata 'implementasi' dalam kalimat 'Pemerintah mulai implementasi program kesehatan' berarti...",["Penolakan","Penundaan","Pelaksanaan","Penyempurnaan"]],
["Bacalah penggalan teks berikut: 'Dengan membaca buku, wawasan kita akan bertambah.' Hubungan antar kalimat di atas adalah...",["Sebab-akibat","Perbandingan","Pertentangan","Penegasan"]],
["Dalam menulis teks eksplanasi, penggunaan data ilmiah bertujuan untuk...",["Menghibur pembaca","Memperkuat penjelasan","Mengulang informasi","Menambah paragraf"]],
["Sinonim kata 'urgensi' adalah...",["Kepentingan","Keraguan","Kebaikan","Keuntungan"]],
["Bacalah kalimat berikut: 'Siswa itu rajin, tetapi nilainya tetap rendah.' Hubungan antar kalimat di atas adalah hubungan...",["Sebab-akibat","Pertentangan","Penegasan","Perbandingan"]],
["Kata 'kreatif' berkaitan dengan kemampuan untuk...",["Mengikuti perintah","Meniru karya orang lain","Membuat sesuatu yang baru","Mengulang informasi"]],
["Dalam membuat teks laporan, bagian simpulan berfungsi untuk...",["Merangkum hasil pengamatan","Memperpanjang laporan","Memperkenalkan objek","Menambah data baru"]],
["Bacalah teks berikut: 'Banjir yang melanda kota tersebut disebabkan oleh buruknya sistem drainase.' Ide utama kalimat di atas adalah...",["Buruknya sistem drainase","Kota yang terkena banjir","Banjir disebabkan oleh sesuatu","Sistem drainase yang baik"]],
["Kata baku dari 'praktek' adalah...",["Praktek","Praktik","Praktekan","Praktikan"]],
["Bacalah kalimat berikut: 'Setelah rapat selesai, para peserta pulang ke rumah masing-masing.' Kata 'selesai' dalam kalimat tersebut berfungsi sebagai...",["Kata benda","Kata kerja","Kata sifat","Kata bilangan"]],
["Dalam diskusi, moderator bertugas untuk...",["Membuat kesimpulan akhir","Menyampaikan pendapat pribadi","Mengatur jalannya diskusi","Menulis notulen"]],
["Kalimat berikut yang mengandung makna konotatif adalah...",["Ayah bekerja di kantor","Hatiku berbunga-bunga saat bertemu sahabat","Ibu memasak di dapur","Kakak membaca buku"]],
["Dalam teks persuasi, tujuan utamanya adalah...",["Meyakinkan pembaca agar melakukan sesuatu","Menjelaskan proses","Menghibur pembaca","Menguraikan data"]],
["Bacalah kutipan berikut: 'Pendidikan karakter sangat penting untuk membentuk generasi bangsa yang berintegritas.' Ide pokok kalimat di atas adalah...",["Pendidikan karakter penting","Generasi bangsa berintegritas","Pendidikan karakter membentuk generasi bangsa","Integritas bangsa"]],
["Kata 'efektif' dalam konteks pembelajaran berarti...",["Cepat selesai","Sesuai tujuan dan hasilnya optimal","Banyak materi","Sulit dipahami"]],
["Bacalah kalimat berikut: 'Para siswa berpartisipasi aktif dalam kegiatan bakti sosial.' Kata 'berpartisipasi' berarti...",["Menonton acara","Ikut serta dalam kegiatan","Menyusun acara","Mengawasi kegiatan"]],
["Dalam menulis teks ulasan film, bagian yang berisi penilaian terhadap film disebut...",["Orientasi","Tafsiran","Evaluasi","Koda"]],
["Kata 'mencerminkan' pada kalimat 'Sikap jujur mencerminkan kepribadian baik' bermakna...",["Menyembunyikan","Menunjukkan","Menghilangkan","Menutupi"]],
["Bacalah kutipan berikut: 'Pemerintah mengimbau masyarakat untuk tidak mudah percaya pada berita hoaks.' Kata 'hoaks' berarti...",["Informasi benar","Informasi palsu","Informasi lengkap","Informasi resmi"]],
["Dalam teks diskusi, bagian yang memuat permasalahan disebut...",["Argumen","Isu","Kesimpulan","Saran"]]
];

let soalUraian=[
"Jelaskan perbedaan utama antara teks eksposisi dan teks argumentasi beserta contohnya!",
"Analisis pentingnya penggunaan bahasa Indonesia yang baik dan benar di era digital!",
"Analisis fenomena siswa lebih suka video pembelajaran!",
"Buat paragraf argumentatif tentang literasi digital!",
"Jelaskan langkah-langkah membuat pidato efektif!"
];

/* ================= RENDER ================= */
function render(){
soalIsian.forEach((s,i)=>{
isianlist.innerHTML+=`<li>${i+1}. ${s}<textarea id="isian${i}"></textarea></li>`;
});
soalPG.forEach((s,i)=>{
let html=`<li>${i+1}. ${s[0]}`;
s[1].forEach((o,j)=>{
let h=["A","B","C","D"][j];
html+=`<div class="opsi" data-name="q${i}" data-value="${h}">${h}. ${o}</div>`;
});
html+=`</li>`;
pglist.innerHTML+=html;
});
soalUraian.forEach((s,i)=>{
uraianlist.innerHTML+=`<li>${i+1}. ${s}<textarea id="uraian${i}"></textarea></li>`;
});
}

/* ================= VALIDASI ================= */
function next(id){

if(id==="pgSection"){
for(let i=0;i<soalIsian.length;i++){
let el=document.getElementById("isian"+i);
if(!el.value.trim()){
alert("Isi semua ISIAN!");
el.scrollIntoView();
return;
}
}
}

if(id==="uraianSection"){
for(let i=0;i<soalPG.length;i++){
if(!document.querySelector(`.opsi.selected[data-name="q${i}"]`)){
alert("Jawab semua PG!");
document.querySelector(`[data-name="q${i}"]`).scrollIntoView();
return;
}
}
}

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

/* ================= MULAI ================= */
function mulai(){

if(!nama.value.trim()){
alert("Nama wajib diisi!");
nama.focus();
return;
}

simpan();

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById("isianSection").classList.remove("hidden");

waktu=localStorage.getItem(KEY_TIME)||5400;

interval=setInterval(()=>{
waktu--;
localStorage.setItem(KEY_TIME,waktu);

let m=Math.floor(waktu/60),s=waktu%60;
timer.innerHTML=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;

if(waktu<=0){
alert("Waktu habis");
kirim();
}
},1000);
}

/* ================= SIMPAN ================= */
function simpan(){
let data={nama:nama.value,isian:[],pg:[],uraian:[]};

soalIsian.forEach((_,i)=>data.isian.push(document.getElementById("isian"+i).value));
soalPG.forEach((_,i)=>{
let p=document.querySelector(`.opsi.selected[data-name="q${i}"]`);
data.pg.push(p?p.dataset.value:"");
});
soalUraian.forEach((_,i)=>data.uraian.push(document.getElementById("uraian"+i).value));

localStorage.setItem(KEY_DATA,JSON.stringify(data));
}

document.addEventListener("input",simpan);

document.addEventListener("click",e=>{
if(e.target.classList.contains("opsi")){
let name=e.target.dataset.name;
document.querySelectorAll(`[data-name="${name}"]`).forEach(el=>el.classList.remove("selected"));
e.target.classList.add("selected");
simpan();
}
});

/* ================= LOAD ================= */
function loadData(){
let data=JSON.parse(localStorage.getItem(KEY_DATA)||"{}");

if(data.nama){
nama.value=data.nama;
nama.disabled=true;
}

if(data.isian){
data.isian.forEach((v,i)=>{
let el=document.getElementById("isian"+i);
if(el) el.value=v;
});
}

if(data.pg){
data.pg.forEach((v,i)=>{
if(v){
let el=document.querySelector(`.opsi[data-name="q${i}"][data-value="${v}"]`);
if(el) el.classList.add("selected");
}
});
}

if(data.uraian){
data.uraian.forEach((v,i)=>{
let el=document.getElementById("uraian"+i);
if(el) el.value=v;
});
}
}

/* ================= KIRIM ================= */
function kirim(){

if(!nama.value.trim()){
alert("Nama belum diisi!");
return;
}

for(let i=0;i<soalUraian.length;i++){
if(!document.getElementById("uraian"+i).value.trim()){
alert("Isi semua URAIAN!");
return;
}
}

// 🔥 AMBIL DATA
let data={
nama:nama.value,
mapel:MAPEL,
isian:[],
pg:[],
uraian:[]
};

soalIsian.forEach((_,i)=>{
data.isian.push(document.getElementById("isian"+i).value);
});

soalPG.forEach((_,i)=>{
let p=document.querySelector(`.opsi.selected[data-name="q${i}"]`);
data.pg.push(p?p.dataset.value:"");
});

soalUraian.forEach((_,i)=>{
data.uraian.push(document.getElementById("uraian"+i).value);
});

// 🔥 KIRIM KE GAS
fetch(URL,{ 
  method:"POST",
  body:JSON.stringify(data)
})
.then(r=>r.text())
.then(t=>{
alert("Server: "+t);

localStorage.removeItem(KEY_DATA);
localStorage.removeItem(KEY_TIME);
})
.catch(err=>{
alert("Error: "+err);
});
}
/* ================= INIT ================= */
window.onload=function(){
render();
loadData();
if(localStorage.getItem(KEY_DATA)){
let data=JSON.parse(localStorage.getItem(KEY_DATA));
if(data.nama){
nama.value=data.nama;
nama.disabled=true;

// 🔥 UBAH TOMBOL
document.querySelector("#identitasSection button").innerText="Lanjutkan Ujian";
}
}
};
</script>

</body>
</html>
