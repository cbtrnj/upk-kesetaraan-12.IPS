<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UPK Bahasa Indonesia</title>
  <style>
*{box-sizing:border-box;}
html,body{
margin:0;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:linear-gradient(135deg, #f0f4f8 0%, #e3eef9 50%, #dce7f0 100%);
overflow-x:hidden;
min-height:100%;
}

.header{
position:fixed;
top:0;
width:100%;
background:linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
color:#fff;
text-align:center;
padding:18px 10px;
z-index:999;
box-shadow:0 8px 32px rgba(37, 99, 235, 0.3), 0 0 40px rgba(59, 130, 246, 0.25);
backdrop-filter:blur(10px);
border-bottom:2px solid rgba(255, 255, 255, 0.2);
}

.header-content{
max-width:700px;
margin:auto;
}

.logo{
width:65px;
height:65px;
display:block;
margin:auto;
border-radius:50%;
background:rgba(255,255,255,0.2);
padding:8px;
border:2px solid rgba(255,255,255,0.3);
}

.header div:nth-child(2){
font-size:17px;
font-weight:700;
margin-top:8px;
letter-spacing:0.8px;
text-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.header div:nth-child(3){
font-size:14px;
opacity:0.95;
margin-top:2px;
}

.header div:nth-child(4){
font-size:12px;
opacity:0.88;
letter-spacing:0.5px;
}

.timer{
font-size:24px;
font-weight:900;
margin-top:10px;
background:rgba(255, 255, 255, 0.2);
padding:10px 20px;
border-radius:25px;
display:inline-block;
border:2px solid rgba(255, 255, 255, 0.4);
box-shadow:0 0 25px rgba(255, 255, 255, 0.3), 0 4px 15px rgba(0,0,0,0.1);
letter-spacing:1px;
color:#fff;
font-weight:900;
}

body{
  padding-top:260px;
}

.container{
  max-width:720px;
  margin:auto;
  padding:20px;
  margin-top:0;
  margin-bottom:50px;
}

section h3{
font-size:22px;
font-weight:800;
color:#fff;
margin:0 0 25px 0;
text-transform:uppercase;
letter-spacing:1.5px;
text-shadow:0 2px 10px rgba(0,0,0,0.2);
}

#identitasSection{
background:rgba(255,255,255,0.98);
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
}

#identitasSection h3{
color:#3b82f6;
margin-bottom:30px;
}

#identitasSection label{
display:block;
color:#555;
font-weight:600;
margin-bottom:8px;
font-size:14px;
letter-spacing:0.3px;
}

#identitasSection input{
width:100%;
padding:16px;
margin:0 0 25px 0;
font-size:16px;
border:2px solid #e0e7ff;
border-radius:12px;
transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
font-family:inherit;
background:#fafbff;
}

#identitasSection input:focus{
outline:none;
border-color:#3b82f6;
box-shadow:0 0 0 4px rgba(59, 130, 246, 0.2), 0 0 15px rgba(59, 130, 246, 0.3);
background:#fff;
}

#identitasSection input:disabled{
background:#f0f0f0;
color:#999;
}

li{
margin-bottom:28px;
line-height:1.8;
padding:28px;
background:rgba(255,255,255,0.98);
border-radius:18px;
box-shadow:0 10px 35px rgba(0,0,0,0.2), 0 0 20px rgba(59, 130, 246, 0.15);
transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
position:relative;
overflow:hidden;
border:1px solid rgba(59, 130, 246, 0.2);
}

li::before{
content:'';
position:absolute;
top:0;left:0;right:0;
height:4px;
background:linear-gradient(90deg, #3b82f6, #1e40af, #3b82f6);
}

li:hover{
transform:translateY(-5px);
box-shadow:0 15px 50px rgba(59, 130, 246, 0.25), 0 0 30px rgba(59, 130, 246, 0.2);
border-color:rgba(59, 130, 246, 0.4);
}

.question-number{
font-weight:800;
color:#3b82f6;
font-size:16px;
margin-bottom:8px;
}

.opsi{
display:block;
padding:16px 18px;
margin:14px 0;
border:2.5px solid #e0e7ff;
border-radius:12px;
background:#fafbff;
cursor:pointer;
transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
font-size:15px;
position:relative;
font-weight:500;
color:#333;
}

.opsi::before{
content:'';
position:absolute;
left:0;top:0;bottom:0;
width:4px;
background:transparent;
transition:all 0.3s ease;
}

.opsi:hover{
border-color:#a8d4ff;
background:#f0f7ff;
transform:translateX(6px);
}

.opsi:hover::before{
background:linear-gradient(180deg, #3b82f6, #1e40af);
}

.opsi.selected{
background:linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
color:#fff;
border-color:#3b82f6;
box-shadow:0 8px 25px rgba(59, 130, 246, 0.4), 0 0 15px rgba(59, 130, 246, 0.25);
font-weight:600;
}

.opsi.selected::before{
background:#fff;
width:6px;
}

textarea,input[type="text"]{
width:100%;
padding:16px;
margin:12px 0 8px 0;
font-size:15px;
border:2.5px solid #e0e7ff;
border-radius:12px;
font-family:inherit;
transition:all 0.3s ease;
resize:vertical;
background:#fafbff;
color:#333;
font-weight:500;
line-height:1.6;
}

textarea:focus,input[type="text"]:focus{
outline:none;
border-color:#3b82f6;
box-shadow:0 0 0 4px rgba(59, 130, 246, 0.2), 0 0 15px rgba(59, 130, 246, 0.3);
background:#fff;
}

textarea::placeholder,input[type="text"]::placeholder{
color:#aaa;
}

button{
width:100%;
padding:18px 24px;
margin:20px 0 12px 0;
background:linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
color:#fff;
border:none;
border-radius:12px;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
text-transform:uppercase;
letter-spacing:1px;
box-shadow:0 8px 25px rgba(59, 130, 246, 0.35), 0 0 20px rgba(59, 130, 246, 0.15);
position:relative;
overflow:hidden;
}

button::before{
content:'';
position:absolute;
top:0;left:-100%;right:0;bottom:0;
background:rgba(255,255,255,0.1);
transition:left 0.3s ease;
}

button:hover::before{
left:100%;
}

button:hover:not(:disabled){
transform:translateY(-3px);
box-shadow:0 12px 35px rgba(59, 130, 246, 0.5), 0 0 30px rgba(59, 130, 246, 0.3);
}

button:active:not(:disabled){
transform:translateY(-1px);
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

.hidden{
display:none;
}

section{
animation:fadeIn 0.5s ease both;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

li{
animation:slideUp 0.5s ease both;
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:600px){
.header{padding:15px 10px;}
.header div:nth-child(2){font-size:15px;}
.timer{font-size:20px;padding:8px 16px;}
.container{margin-top:200px;padding:15px;}
#identitasSection{padding:25px;}
li{padding:20px;}
button{padding:16px 20px;font-size:15px;}
}
</style>

 </head>
 <body>
  <div class="header">
   <div class="header-content">
    <img src="https://i.imgur.com/J1mKppg.png" class="logo">
    <div>
     UJIAN PENDIDIKAN KESETARAAN (UPK)
    </div>
    <div>
     PKBM Ristek Nusantara Jaya
    </div>
    <div>
     UPK Bahasa Indonesia
    </div>
    <div class="timer" id="timer">
     90:00
    </div>
   </div>
  </div>
  <div class="container">
   <section id="identitasSection">
    <h3>Data Peserta</h3><label for="nama">Nama Lengkap:</label> <input id="nama"> <button onclick="mulai()">Mulai Ujian</button>
   </section>
   <section id="isianSection" class="hidden">
    <h3>📝 Bagian I: Isian Singkat</h3>
    <ul id="isianlist"></ul><button onclick="next('pgSection')">Lanjut ke Pilihan Ganda →</button>
   </section>
   <section id="pgSection" class="hidden">
    <h3>✓ Bagian II: Pilihan Ganda</h3>
    <ul id="pglist"></ul><button onclick="next('uraianSection')">Lanjut ke Uraian →</button> <button onclick="next('isianSection')">← Kembali ke Isian</button>
   </section>
   <section id="uraianSection" class="hidden">
    <h3>📄 Bagian III: Uraian</h3>
    <ul id="uraianlist"></ul><button onclick="next('pgSection')">← Kembali ke Pilihan Ganda</button> <button onclick="kirim()">✓ Kirim Semua Jawaban</button>
   </section>
  </div>
  <script>
const MAPEL="BINDO";
const URL="https://script.google.com/macros/s/AKfycbxM3g6okiRl6T4lY6-oI8_0TnDDHbr1DWvX-9NIhPi7lX42qlRzXNJIZ6LN-9i5DTXF/exec";
const KEY_DATA="UPK_"+MAPEL+"_DATA";
const KEY_TIME="UPK_"+MAPEL+"_TIME"

let waktu=0,interval;

/* ================= SOAL ================= */
let soalIsian=[
"Seni rupa yang memiliki fungsi pakai dalam kehidupan sehari-hari disebut seni rupa ____________.",
"Kegiatan menampilkan karya seni kepada masyarakat untuk mendapatkan apresiasi disebut ____________.",
"Orang yang menciptakan karya musik disebut ____________.",
"Penggambaran suasana, tempat, dan waktu dalam pertunjukan teater disebut ____________.",
"Kegiatan memberikan penilaian dan tanggapan terhadap karya seni disebut ____________."
];

let soalPG=[
["Seni yang dapat digunakan untuk mengkomunikasikan sesuatu seperti pesan, kritik, kebijakan, gagasan dan produk kepada orang banyak, merupakan fungsi karya seni rupa dalam bidang……..",["Komunikasi","Edukasi/pendidikan","Rekreasi/hiburan","Religi/keagamaan","Individual"]],
["Salah satu manfaat penyelenggaraan pameran bagi siswa adalah……...",["Egois","Sombong","Malas belajar","Memperoleh uang","Meningkatkan apresiasi"]],
["Dalam berkarya seni menggunakan alat mesin dan dalam jumlah yang banyak serta berwujud barang pakai, serin disebut seni…….",["Foto","Komik","Grafika","Industri","Ilustrasi"]],
["Gambar hitam bayangan suatu objek, dengan atau tanpa modifikasi disebut……….",["Lukisan","Sketsa","Karikatur","Vinyet","Siluet"]],
["Setelah tujuan pameran dirumuskan, selanjutnya adalah menentukan tema pameran. Penentuan tema berfungsi untuk…….",["Melakukan penafsiran","Membuat analisis","Melakukan evaluasi","Membuat penilaian","Menyusun deskripsi"]],
["Seni kriya termasuk seni rupa terapan (applied art), seni rupa yang tercipta untuk kegunaan dan fungsi praktis tertentu dalam……..",["Hobi","Ekspresi seni","Kesenangan","Kebutuhan rohani","Kehidupan manusia"]],
["Kesamaan seni kriya dan seni rupa terapan adalah………..",["Berbentuk","Karya seni","Memiliki fungsi praktis","Memiliki warna","Keduanya karya manusia"]],
["Menemukan, mencatat, dan menggambarkan segala sesuatu yang dilihat apa adanya dan berusaha melakukan analisis atau mengambil kesimpulan, merupakan tahapan dalam kritik karya seni rupa yaitu…………",["Menilai","Menafsirkan","Deskripsi","Analisis","Interpretasi"]],
["Teknik pembuatan karya seni kriya yang memiliki keistimewaan dapat membuat karya dengan bentuk yang sama dalam jumlah lebih dari satu adalah teknik……",["Ukir","Cor","Pahat","Butsir","Tenun"]],
["Di bawah ini merupakan tujuan dari diadakannya sebuah pameran, kecuali……….",["Sarana pendidikan","Sarana apresiasi","Sarana spiritual","Sarana hiburan","Sarana prestasi"]],
["Di bawah ini merupakan salah satu langkah kreasi musik, adalah………..",["Harmoni rumit","Musik emosional","Pemakaian ornamentik dibatasi","Vokal dan lirik merupakan bagian dari instrumen","Mengaransemen lagu yang dipilih"]],
["Sikap mengembangkan kreativitas, mensintesiskan, belajar menggunakan alat dan media ungkap dalam berolah musik, serta membuat dan menyajikan karya seni musik disebut……..",["Keterampilan","Eksekusi","Perseptual","Kreatif","Inovatif"]],
["Karya cipta musik yang tidak tertulis, berlangsung sekali saja disebut….…",["Musisi","Ekspresi ","Nyanyian","Kreativitas","Improvisasi"]],
["Berikut ini termasuk jenis musik non tradisional, kecuali……..…",["Karawitan","Jazz","Rock","Keroncong","Campur sari"]],
["Orang yang mahir bermain musik disebut…………",["Komponis","Senior","Arranger","Kolektor","Musisi"]],
["Salah satu teknik yang dipakai dalam membuat syair lagu adalah…..",["Mengembangkan Ide ","Berlatih teknik vokal","Menyusun aransemen","Menggubah lagu","Menyelami perasaan"]],
["Teori musik merupakan cabang ilmu yang menjelaskan tentang……",["Tokoh musik dunia","Aransemen lagu","Unsur-unsur musik","Pembabakan musik dunia","Sejarah musik di suatu daerah"]],
["Kata-kata dalam musik dapat berbentuk..…..",["Nada","Tema","Birama","Syair lagu","Isi lagu"]],
["Musik yang memiliki sifat formal dan disiplin tinggi, namun dihadiri oleh jumlah penonton yang jauh lebih besar daripada penyajian musik lainnya adalah……..",["Penyajian musik tunggal","Penyajian musik elektrik","Penyajian musik duet","Penyajian musik orchestra","Penyajian kelompok musik terbatas"]],
["Kegiatan memberi penghargaan pada hasil karya seni musik disebut………",["Apresiasi musik","Pameran musik","Pergelaran musik","Orchestra","Pertunjukan musik"]],
["Jenis panggung pertunjukan yang dilakukan di lapangan, di halaman rumah atau halaman lainnya adalah jenis panggung……….",["Arena","Tertutup","Tertata","Prosenium","Campuran"]],
["Di bawah ini merupakan fungsi musik dalam tarian, kecuali…….",["Memberi irama","Memberi ilustrasi atau gambaran suasana","Membantu mempertegas ekspresi gerak","Rangsangan bagi penari","Proses stilasi dan seleksi gerak"]],
["Rias yang memberikan tekanan pada pemain yang sudah mendekati peranan yang akan dimainkannya, merupakan ciri khas dari rias…….",["Rias aksen","Rias jenis","Rias bangsa","Rias usia","Rias temporal"]],
["Orang yang membuat konsep dari pertunjukan dan mengatur alur atau laku dai sebuah pertunjukan adalah……..",["Pimpinan artistik (art director)","Sutradara/koreografer","Stage manajer","Penata panggung (scenery)","Penata cahaya"]],
["Sedangkan orang yang menjadi layanan pemenuhan kepada penyaji  karya seni dan tuntunan artistik garapan berdasarkan saran dari pimpinan artistik adalah…..…",["Pimpinan artistik (art director)","Sutradara/koreografer","Stage manajer","Penata panggung (scenery)","Penata cahaya"]],
["Hal-hal yang tidak perlu dipersiapkan dalam pertunjukan tari adalah…….",["Gerakan tari","Busana","Musik","Panggung","Dialog "]],
["Rangsangan yang muncul karena mata menangkap berbagai hal yang menarik untuk diungkapkan dalam bentuk gerak tari disebut rangsang…..…",["Visual","Auditif","Indra","Langsung","Verbal"]],
["Di bawah ini tahapan dalam mengeksplorasi gerak tari, kecuali………",["Mendengar","Berfikir","Berimajinasi","Merasakan","Merespons"]],
["Tahap dalam kritik tari yang melihat teknik-teknik gerakan tari dan teknik pencahayaan disebut tahap………",["Evaluasi","Deteksi","Deskripsi","Interpretasi","Analisis formal"]],
["Berikut ini yang tidak dibahas dalam pratinjau (preview) adalah………..",["Penari","Koreografer","Reaksi penonton","Waktu dan tempat pergelaram","Judul karya yang akan ditampilkan"]],
["Berikut ini yang bukan termasuk fungsi tata musik dalam pergelaran teater adalah………..",["Memberi selingan","Memberi ilustrasi","Membingungkan pemain","Memberi warna psikologis","Memberi latar belakang"]],
["Gagasan dasar cerita yang disampaikan oleh penulis cerita kepada penonton disebut………..",["Tema","Lakon","Naskah","Blocking","Sinopsis"]],
["Di bawah ini merupakan tugas sutradara, kecuali………..",["Menentukan nada dasar","Memilih pemain atau meng-casting pemain","Mengadakan latihan rutin","Menduplikat kostum","Membuat gambaran tentang tata teknik pentas"]],
["Penataan pentas yang harus dapat memberi pandangan yang menark bagi penonton, disebut………..",["Lokatif","Ekspresif","Atraktif","Praktis","Organis"]],
["Penonton teater tidak jarang merasa takjub melihat peristiwa pentas dengan segala propertinya yang mengesankan hasil dari kekreativitan para pekerja teater. Pernyataan tersebut menunjukkan nilai estetis teater yang berupa nilai…….",["Visual","Verbal","Spiritual","Emosional","Intelektual"]],
["Jenis panggung yang cocok digunakan untuk pementasan yang cenderung formal, Antara pemain dengan penonton terkesan ada jarak adalah panggung………..",["Prosenium","Tapal kuda","Segi empat","Arena","Kipas"]],
["Peran orang yang sederhana dapat diinterpretasikan dengan penggunaan……..",["Kemeja","Perhiasan","Pakaian yang lusuh","Berbagai aksesoris","Jas dan dasi"]],
["Penggambaran mengenai waktu, tempat, dan suasana yang terjadi pada peristiwa-peristiwa dalam suatu cerit disebut…………",["Kostum","Tata cahaya","Jenis panggung pementasan","Tempat  pementasan","Setting "]],
["Berikut yang bukan merupakan ciri, tujuan, dan manfaat kostum adalah……..",["Menginterpretasikan status sosial","Menyesuaikan tema cerita","Memperkuat fokus cerita","Memperkuat karakter","Memeriahkan pertunjukan"]],
["Susunan lakon yang diperagakan oleh emeran disebut..…..",["Plot","Alur","Tema","Adegan","Skenario "]]
];

let soalUraian=[
"Sebutkan dan jelaskan tahapan dalam mengkritisi sebuah karya seni rupa!",
"Apakah yang dimaksud dengan kritikus seni rupa!",
"Sebutkan peranan musik tradisional mancanegara bagi kehidupan masyarakatnya!",
"Berikan 3 (tiga) contoh pertanyaan yang dapat dikembangkan pada tahap pendeskripsian kritik tari!",
"Terangkan fungsi kritik teater sebagai media edukasi!"
];

/* ================= RENDER ================= */
function render(){
soalIsian.forEach((s,i)=>{
isianlist.innerHTML+=`<li><span class="question-number">Soal ${i+1}</span><div>${s}</div><textarea id="isian${i}" placeholder="Tulis jawaban Anda di sini..."></textarea></li>`;
});
soalPG.forEach((s,i)=>{
let html=`<li><span class="question-number">Soal ${i+1}</span><div>${s[0]}</div>`;
s[1].forEach((o,j)=>{
let h = String.fromCharCode(65 + j);
html+=`<div class="opsi" data-name="q${i}" data-value="${h}">${h}. ${o}</div>`;
});
html+=`</li>`;
pglist.innerHTML+=html;
});
soalUraian.forEach((s,i)=>{
uraianlist.innerHTML+=`<li><span class="question-number">Soal ${i+1}</span><div>${s}</div><textarea id="uraian${i}" placeholder="Tulis jawaban Anda secara lengkap..."></textarea></li>`;
});
}

/* ================= VALIDASI ================= */
function next(id){

if(id==="pgSection"){
for(let i=0;i<soalIsian.length;i++){
let el=document.getElementById("isian"+i);
if(!el.value.trim()){
alert("❌ Isi semua jawaban di bagian ISIAN!");
el.scrollIntoView({behavior:'smooth', block:'center'});
return;
}
}
}

if(id==="uraianSection"){
for(let i=0;i<soalPG.length;i++){
if(!document.querySelector(`.opsi.selected[data-name="q${i}"]`)){
alert("❌ Jawab semua soal PILIHAN GANDA!");
document.querySelector(`[data-name="q${i}"]`).scrollIntoView({behavior:'smooth', block:'center'});
return;
}
}
}

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

/* ================= MULAI ================= */
function mulai(){

if(!nama.value.trim()){
alert("❌ Nama wajib diisi!");
nama.focus();
return;
}

simpan();

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById("isianSection").classList.remove("hidden");

waktu=localStorage.getItem(KEY_TIME)||5400;

interval=setInterval(()=>{
waktu--;
localStorage.setItem(KEY_TIME,waktu);

let m=Math.floor(waktu/60),s=waktu%60;
timer.innerHTML=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;

if(waktu<=0){
alert("⏰ Waktu habis!");
kirim();
}
},1000);
}

/* ================= SIMPAN ================= */
function simpan(){
let data={nama:nama.value,isian:[],pg:[],uraian:[]};

soalIsian.forEach((_,i)=>data.isian.push(document.getElementById("isian"+i).value));
soalPG.forEach((_,i)=>{
let p=document.querySelector(`.opsi.selected[data-name="q${i}"]`);
data.pg.push(p?p.dataset.value:"");
});
soalUraian.forEach((_,i)=>data.uraian.push(document.getElementById("uraian"+i).value));

localStorage.setItem(KEY_DATA,JSON.stringify(data));
}

document.addEventListener("input",simpan);

document.addEventListener("click",e=>{
if(e.target.classList.contains("opsi")){
let name=e.target.dataset.name;
document.querySelectorAll(`[data-name="${name}"]`).forEach(el=>el.classList.remove("selected"));
e.target.classList.add("selected");
simpan();
}
});

/* ================= LOAD ================= */
function loadData(){
let data=JSON.parse(localStorage.getItem(KEY_DATA)||"{}");

if(data.nama){
nama.value=data.nama;
nama.disabled=true;
}

if(data.isian){
data.isian.forEach((v,i)=>{
let el=document.getElementById("isian"+i);
if(el) el.value=v;
});
}

if(data.pg){
data.pg.forEach((v,i)=>{
if(v){
let el=document.querySelector(`.opsi[data-name="q${i}"][data-value="${v}"]`);
if(el) el.classList.add("selected");
}
});
}

if(data.uraian){
data.uraian.forEach((v,i)=>{
let el=document.getElementById("uraian"+i);
if(el) el.value=v;
});
}
}

/* ================= KIRIM ================= */
function kirim(){

if(!nama.value.trim()){
alert("❌ Nama belum diisi!");
return;
}

for(let i=0;i<soalUraian.length;i++){
if(!document.getElementById("uraian"+i).value.trim()){
alert("❌ Isi semua jawaban di bagian URAIAN!");
return;
}
}

let data={
nama:nama.value,
mapel:MAPEL,
isian:[],
pg:[],
uraian:[]
};

soalIsian.forEach((_,i)=>{
data.isian.push(document.getElementById("isian"+i).value);
});

soalPG.forEach((_,i)=>{
let p=document.querySelector(`.opsi.selected[data-name="q${i}"]`);
data.pg.push(p?p.dataset.value:"");
});

soalUraian.forEach((_,i)=>{
data.uraian.push(document.getElementById("uraian"+i).value);
});

fetch(URL,{ 
  method:"POST",
  body:JSON.stringify(data)
})
.then(r=>r.text())
.then(t=>{
alert("✅ Server: "+t);

localStorage.removeItem(KEY_DATA);
localStorage.removeItem(KEY_TIME);
})
.catch(err=>{
alert("❌ Error: "+err);
});
}

/* ================= INIT ================= */
window.onload=function(){
render();
loadData();
if(localStorage.getItem(KEY_DATA)){
let data=JSON.parse(localStorage.getItem(KEY_DATA));
if(data.nama){
nama.value=data.nama;
nama.disabled=true;

document.querySelector("#identitasSection button").innerText="Lanjutkan Ujian";
}
}
};
